server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compression — the standards JSON is ~4 MB uncompressed.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        application/json application/javascript text/css text/plain text/html image/svg+xml;

    # Security headers.
    # NOTE: nginx does NOT inherit server-level add_header into a location that
    # defines its own add_header, so the caching locations below repeat these.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health endpoint for Docker/compose/CI probes.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # index.html must always be revalidated so redeploys are picked up.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }

    # Data file changes on every redeploy; force revalidation.
    location /data/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
