# Deployment compose file for the host 162.19.250.88.
# The CI pipeline copies this file to ~/hkl-sop-kks on the server and runs
#   docker compose pull && docker compose up -d
services:
  hkl-sop-kks:
    image: ghcr.io/bosock/hkl-sop-kks:latest
    container_name: hkl-sop-kks
    restart: unless-stopped
    ports:
      # Host port is configurable via .env (HOST_PORT); defaults to 8080.
      - "${HOST_PORT:-8080}:80"
    volumes:
      # Server-side state (edits made in the web interface) persists here and
      # survives `docker compose pull && up -d` redeploys.
      - hkl-state:/app/state
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  hkl-state:
