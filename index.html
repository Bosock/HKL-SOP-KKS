<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c1116">
<title>HKL Standards</title>
<style>
  /* ============================================================
     HKL Standards — Frontend v4
     NEU ggü. v3: Kategorien (Naturen) sind KONFIGURIERBAR.
     Prinzip "Trennung von Konfiguration und Code":
       - DEFAULT_NAT  = Voreinstellungen im Code (Standardwerte)
       - Verwaltung   = Editor (ändert die Konfiguration ohne Code)
       - localStorage = lokaler Zwischenspeicher (offline-first)
       - Server-State = zentrale Persistenz (siehe sync-Baustein unten):
         Änderungen werden zusätzlich server-seitig unter /api/state
         gespeichert und über alle Geräte hinweg geteilt.
       - applyNatConfig() schreibt die Farben als CSS-Variablen,
         die App liest sie überall. Eine Änderung wirkt sofort überall.
     ============================================================ */
  :root {
    --bg:#0c1116; --surface:#141d26; --surface-2:#1c2733; --surface-3:#243140;
    --line:#2b3a4c; --line-soft:#212e3d; --text:#e8eef5; --text-dim:#93a4b8; --text-faint:#5f7387;
    --accent:#3d9be0; --accent-deep:#1b73b8;
    /* Natur-Farben: nur Erst-Anzeige. Zur Laufzeit von applyNatConfig() überschrieben. */
    --n-material:#34c98a; --n-geraet:#e8b34a; --n-medikament:#bd8ce8; --n-hinweis:#7f95ab; --n-ueberschrift:#3d9be0;
    --size:#21c1d6; --size-bg:rgba(33,193,214,.12); --size-bd:rgba(33,193,214,.34);
    --warn:#ef8f42; --danger:#e85d5d; --ok:#34c98a;
    --radius:15px; --tap:52px; --maxw:468px; --mono:"SF Mono","JetBrains Mono","Consolas",ui-monospace,monospace;
  }
  html[data-theme="light"] {
    --bg:#eceff3; --surface:#fff; --surface-2:#f2f5f9; --surface-3:#e7edf3;
    --line:#d2dce6; --line-soft:#e2e9f0; --text:#14212e; --text-dim:#526274; --text-faint:#8193a6;
    --accent:#1b73b8; --accent-deep:#145a96;
    --size:#0f97aa; --size-bg:rgba(15,151,170,.11); --size-bd:rgba(15,151,170,.30);
    --warn:#c56a15; --danger:#cc3b3b; --ok:#199467;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:"Segoe UI",system-ui,-apple-system,sans-serif; font-size:17px; line-height:1.45; overscroll-behavior-y:none; transition:background .25s,color .25s; }
  .app { max-width:var(--maxw); margin:0 auto; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; position:relative; }

  header.bar { position:sticky; top:0; z-index:50; background:var(--surface); border-bottom:1px solid var(--line); }
  .bar-row { display:flex; align-items:center; gap:10px; padding:11px 13px; }
  .icon-btn { width:43px; height:43px; flex:0 0 43px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2); color:var(--text); font-size:21px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .icon-btn:active { background:var(--surface-3); }
  .icon-btn[hidden] { display:none; }
  .bar-title { flex:1; min-width:0; }
  .bar-title h1 { margin:0; font-size:17px; font-weight:650; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* Server-Sync-Status: kleiner Punkt im Kopf. */
  .sync-dot { width:9px; height:9px; border-radius:50%; flex:0 0 9px; background:var(--text-faint); transition:background .2s; cursor:default; }
  .sync-dot.ok { background:var(--ok); }
  .sync-dot.saving { background:var(--accent); }
  .sync-dot.local { background:var(--warn); }
  .sync-dot.err { background:var(--danger); }
  .bar-title .crumb { font-size:11.5px; color:var(--text-dim); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .modes { display:flex; gap:4px; padding:0 13px 11px; }
  .modes button { flex:1; border:1px solid transparent; background:var(--surface-2); color:var(--text-dim); font-size:12.5px; font-weight:600; padding:10px 6px; border-radius:10px; cursor:pointer; transition:all .15s; }
  .modes button.on { background:var(--accent-deep); color:#fff; box-shadow:0 2px 10px rgba(27,115,184,.3); }

  .search-wrap { padding:0 13px 11px; }
  .search { display:flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:0 12px; height:45px; }
  .search:focus-within { border-color:var(--accent); }
  .search svg { flex:0 0 17px; opacity:.55; }
  .search input { flex:1; border:none; background:transparent; color:var(--text); font-size:15px; outline:none; height:100%; }
  .search input::placeholder { color:var(--text-faint); }
  .search .clear { background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; padding:4px; display:none; }
  .search .clear.show { display:block; }

  main { flex:1; overflow-y:auto; padding:13px; padding-bottom:44px; -webkit-overflow-scrolling:touch; }
  .screen { display:none; }
  .screen.active { display:block; animation:fade .18s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:none; } }

  .grp { font-size:11px; font-weight:700; letter-spacing:.11em; text-transform:uppercase; color:var(--text-faint); margin:17px 4px 8px; display:flex; align-items:center; gap:8px; }
  .grp:first-child { margin-top:2px; }
  .grp .ln { flex:1; height:1px; background:var(--line); }

  .std { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px 15px; margin-bottom:8px; display:flex; align-items:center; gap:12px; cursor:pointer; min-height:var(--tap); transition:border-color .15s,transform .05s; }
  .std:active { border-color:var(--accent); transform:scale(.995); }
  .std-badge { font-size:10.5px; font-weight:700; letter-spacing:.03em; padding:4px 8px; border-radius:7px; flex:0 0 auto; background:var(--surface-3); color:var(--text-dim); }
  .std-main { flex:1; min-width:0; }
  .std-title { font-weight:620; font-size:15.5px; letter-spacing:-.01em; }
  .std-file { font-size:11.5px; color:var(--text-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .std .chev { color:var(--text-faint); font-size:22px; flex:0 0 auto; }

  .rub { background:var(--surface); border:1px solid var(--line); border-left:4px solid var(--n-hinweis); border-radius:13px; padding:15px; margin-bottom:8px; cursor:pointer; display:flex; align-items:center; gap:13px; min-height:var(--tap); transition:transform .05s; }
  .rub:active { transform:scale(.995); }
  .rub.material { border-left-color:var(--n-material); }
  .rub.geraete { border-left-color:var(--n-geraet); }
  .rub.sonstige { border-left-color:var(--n-hinweis); }
  .rub-ico { width:40px; height:40px; flex:0 0 40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--surface-2); }
  .rub-main { flex:1; min-width:0; }
  .rub-name { font-weight:620; font-size:15px; }
  .rub-meta { font-size:11.5px; color:var(--text-dim); margin-top:2px; }
  .rub-pill { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:3px 7px; border-radius:5px; flex:0 0 auto; }
  .pill-material { background:rgba(52,201,138,.15); color:var(--n-material); }
  .pill-geraete { background:rgba(232,179,74,.15); color:var(--n-geraet); }
  .pill-sonstige { background:rgba(127,149,171,.15); color:var(--n-hinweis); }

  .sub-head { font-size:12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--accent); margin:20px 2px 9px; }

  .uksec { margin:14px 0 4px; border-radius:12px; overflow:hidden; border:1px solid var(--line-soft); }
  .uksec-head { display:flex; align-items:center; gap:10px; padding:11px 13px; cursor:pointer; background:var(--surface-2); border-left:4px solid var(--uk,#7f95ab); }
  .uksec-head:active { background:var(--surface-3); }
  .uksec-ico { font-size:17px; flex:0 0 auto; }
  .uksec-name { flex:1; min-width:0; font-size:13.5px; font-weight:700; color:var(--text); }
  .uksec-count { font-size:11px; color:var(--text-faint); font-variant-numeric:tabular-nums; }
  .uksec-arrow { font-size:13px; color:var(--text-dim); transition:transform .2s; }
  .uksec.collapsed .uksec-arrow { transform:rotate(-90deg); }
  .uksec-body { padding:8px; }
  .uksec.collapsed .uksec-body { display:none; }

  .entry { background:var(--surface); border:1px solid var(--line-soft); border-left:3px solid var(--n-hinweis); border-radius:11px; margin-bottom:7px; }
  .entry-row { display:flex; align-items:flex-start; gap:10px; padding:11px 12px; cursor:pointer; min-height:var(--tap); }
  .entry-row:active { background:var(--surface-2); }
  .chk { width:26px; height:26px; flex:0 0 26px; border-radius:8px; margin-top:2px; border:2px solid var(--line); background:transparent; display:flex; align-items:center; justify-content:center; font-size:16px; color:transparent; transition:all .12s; }
  .entry.done .chk { background:var(--ok); border-color:var(--ok); color:#06210f; }
  .entry.done .e-text { color:var(--text-faint); text-decoration:line-through; }

  .mbox { min-width:40px; height:33px; flex:0 0 40px; border-radius:9px; margin-top:1px; background:var(--surface-3); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:800; font-size:15.5px; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .mbox.empty { background:transparent; border-color:transparent; }

  .e-ico { flex:0 0 19px; font-size:14px; margin-top:3px; opacity:.85; text-align:center; }
  .e-main { flex:1; min-width:0; }
  .e-top { display:flex; align-items:baseline; gap:7px; }
  .e-text { font-size:15px; font-weight:500; line-height:1.34; flex:1; }
  .conf { flex:0 0 auto; font-size:13px; color:var(--warn); cursor:help; }
  .edited-mark { flex:0 0 auto; font-size:12px; color:var(--accent); cursor:help; }
  .e-meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; align-items:center; }
  .tag { font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; white-space:nowrap; }
  .tag-spec { color:var(--accent); background:rgba(61,155,224,.13); }
  .tag-loc { color:var(--n-material); background:rgba(52,201,138,.13); }
  .tag-loc.missing { color:var(--text-faint); background:var(--surface-2); }
  .tag-zusatz { color:var(--warn); background:rgba(239,143,66,.13); }
  .size-badge { font-family:var(--mono); font-size:11.5px; font-weight:700; color:var(--size); background:var(--size-bg); border:1px solid var(--size-bd); padding:1px 7px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; }
  .size-badge .st { font-family:"Segoe UI",sans-serif; font-size:8.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; opacity:.68; }
  .e-thumb { width:34px; height:34px; flex:0 0 34px; border-radius:8px; margin-top:1px; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:15px; overflow:hidden; }
  .e-thumb img { width:100%; height:100%; object-fit:cover; }
  .entry.step .e-text { font-weight:500; }

  .legend { background:var(--surface); border:1px solid var(--line); border-radius:12px; margin-bottom:12px; overflow:hidden; }
  .legend summary { padding:12px 14px; font-size:12.5px; font-weight:600; color:var(--text-dim); cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; }
  .legend summary::-webkit-details-marker { display:none; }
  .legend[open] summary { border-bottom:1px solid var(--line-soft); }
  .legend-body { padding:12px 14px; display:flex; flex-direction:column; gap:9px; }
  .lg-row { display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--text-dim); }
  .lg-swatch { width:13px; height:13px; border-radius:4px; flex:0 0 13px; }
  .lg-size { font-family:var(--mono); font-size:10.5px; font-weight:700; color:var(--size); background:var(--size-bg); border:1px solid var(--size-bd); padding:1px 6px; border-radius:5px; }
  .lg-mbox { font-family:var(--mono); font-weight:800; font-size:11px; background:var(--surface-3); border:1px solid var(--line); border-radius:5px; padding:1px 6px; }

  .banner { background:linear-gradient(135deg,var(--surface),var(--surface-2)); border:1px solid var(--line); border-radius:var(--radius); padding:15px; margin-bottom:13px; }
  .banner h2 { margin:0 0 5px; font-size:16.5px; }
  .banner p { margin:0; color:var(--text-dim); font-size:13px; line-height:1.5; }
  .prog { margin-top:12px; }
  .prog-bar { height:7px; background:var(--surface-3); border-radius:5px; overflow:hidden; }
  .prog-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--n-material),var(--accent)); transition:width .4s; }
  .prog-txt { font-size:11.5px; color:var(--text-dim); margin-top:6px; }

  .filter-row { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .filter-row button { flex:1; min-width:60px; padding:9px 6px; font-size:12px; font-weight:600; border-radius:9px; border:1px solid var(--line); background:var(--surface); color:var(--text-dim); cursor:pointer; }
  .filter-row button.on { background:var(--accent-deep); color:#fff; border-color:var(--accent); }

  .mat-row { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--n-material); border-radius:12px; padding:10px 12px; margin-bottom:7px; cursor:pointer; min-height:var(--tap); }
  .mat-row:active { background:var(--surface-2); }
  .mat-thumb { width:44px; height:44px; flex:0 0 44px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; }
  .mat-thumb img { width:100%; height:100%; object-fit:cover; }
  .mat-main { flex:1; min-width:0; }
  .mat-name { font-weight:600; font-size:14.5px; line-height:1.3; }
  .mat-sub { font-size:11px; margin-top:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .dot { width:7px; height:7px; border-radius:50%; flex:0 0 7px; }
  .dot-ok { background:var(--ok); } .dot-open { background:var(--warn); }
  .mat-sub.ok { color:var(--ok); } .mat-sub.open { color:var(--warn); }
  .mat-count { font-size:10.5px; color:var(--text-faint); font-variant-numeric:tabular-nums; }

  .pcard { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .pc-name { font-size:16.5px; font-weight:650; }
  .pc-ctx { font-size:11.5px; color:var(--text-dim); margin:3px 0 14px; }
  .flabel { font-size:11.5px; font-weight:650; color:var(--text-dim); margin-bottom:6px; letter-spacing:.02em; }
  .photo-zone { border:2px dashed var(--line); border-radius:12px; height:138px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text-dim); cursor:pointer; margin-bottom:14px; background:var(--surface-2); overflow:hidden; }
  .photo-zone:active { border-color:var(--accent); }
  .photo-zone .ph-ico { font-size:28px; }
  .photo-zone .ph-sub { font-size:12px; }
  .loc-input { width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:15px; margin-bottom:13px; }
  .loc-input:focus { outline:none; border-color:var(--accent); }
  .info-field { background:var(--surface-2); border:1px solid var(--line-soft); border-radius:9px; padding:10px 12px; margin-bottom:13px; }
  .info-field .if-l { font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .info-field .if-v { display:flex; flex-wrap:wrap; gap:5px; }
  .p-actions { display:flex; gap:9px; }
  .btn { flex:1; padding:13px; border-radius:11px; border:none; font-size:15px; font-weight:650; cursor:pointer; min-height:var(--tap); }
  .btn-sec { background:var(--surface-2); color:var(--text-dim); border:1px solid var(--line); }
  .btn-pri { background:var(--n-material); color:#06210f; }
  .btn-pri:active { filter:brightness(.93); }

  /* Formulare: Eintrag / Standard hinzufügen & bearbeiten (NEU) */
  .form-grp { margin-bottom:14px; }
  .form-grp:last-of-type { margin-bottom:6px; }
  .form-sel { width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:15px; }
  .form-sel:focus { outline:none; border-color:var(--accent); }
  .form-row { display:flex; gap:9px; }
  .form-row > .form-sel, .form-row > .loc-input { flex:1; margin-bottom:0; }
  .natpick { display:flex; flex-wrap:wrap; gap:6px; }
  .natpick button { padding:9px 12px; border-radius:9px; border:1px solid var(--line); background:var(--surface-2); font-size:13px; font-weight:650; cursor:pointer; }
  .natpick button.sel { border-color:currentColor; box-shadow:inset 0 0 0 1px currentColor; }
  .add-entry-btn { width:100%; padding:13px; border-radius:11px; border:1px dashed var(--accent); background:var(--surface-2); color:var(--accent); font-size:14px; font-weight:650; cursor:pointer; margin:10px 0 4px; }
  .add-entry-btn:active { background:var(--surface-3); }
  .added-tag { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:2px 6px; border-radius:5px; background:rgba(61,155,224,.16); color:var(--accent); margin-left:6px; }

  .vpanel { background:var(--surface); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; overflow:hidden; }
  .vpanel summary { padding:13px 14px; font-size:13.5px; font-weight:650; color:var(--text); cursor:pointer; list-style:none; display:flex; align-items:center; gap:9px; }
  .vpanel summary::-webkit-details-marker { display:none; }
  .vpanel summary .vp-hint { font-size:11px; color:var(--text-faint); font-weight:400; margin-left:auto; }
  .vpanel[open] summary { border-bottom:1px solid var(--line-soft); }
  .vpanel-body { padding:13px 14px; }
  .hint { color:var(--text-faint); font-size:11px; line-height:1.5; margin:8px 2px 0; }

  .tgl { display:flex; align-items:center; justify-content:space-between; padding:9px 0; font-size:14px; border-bottom:1px solid var(--line-soft); }
  .tgl:last-child { border-bottom:none; }
  .tgl input { appearance:none; width:44px; height:26px; border-radius:14px; background:var(--surface-3); border:1px solid var(--line); position:relative; cursor:pointer; transition:background .15s; flex:0 0 44px; }
  .tgl input:checked { background:var(--accent-deep); border-color:var(--accent); }
  .tgl input::after { content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; top:2px; left:2px; transition:left .15s; }
  .tgl input:checked::after { left:20px; }

  /* Kategorien-Editor (NEU) */
  .natrow { border:1px solid var(--line-soft); border-radius:10px; padding:11px; margin-bottom:8px; border-left:4px solid #7f95ab; }
  .natrow-head { display:flex; align-items:center; gap:9px; }
  .natrow-head .nat-ico { font-size:19px; flex:0 0 auto; }
  .txtinp { flex:1; min-width:0; padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:14px; font-weight:600; }
  .txtinp:focus { outline:none; border-color:var(--accent); }
  .colinp { width:40px; height:34px; flex:0 0 40px; padding:0; border:1px solid var(--line); border-radius:8px; background:var(--surface-2); cursor:pointer; }
  .colinp::-webkit-color-swatch-wrapper { padding:3px; }
  .colinp::-webkit-color-swatch { border:none; border-radius:5px; }
  .nat-actions { display:flex; gap:6px; margin-top:9px; }
  .nat-actions button { font-size:11.5px; font-weight:600; padding:7px 10px; border-radius:8px; border:1px solid var(--line); background:var(--surface-2); color:var(--text-dim); cursor:pointer; }
  .nat-actions button.danger-btn { color:var(--danger); border-color:rgba(232,93,93,.35); }
  .nat-foot { display:flex; gap:8px; margin-top:4px; }
  .nat-foot button { flex:1; padding:11px; border-radius:9px; border:1px solid var(--line); font-size:13px; font-weight:650; cursor:pointer; }
  .nat-foot .add-btn { background:var(--accent-deep); color:#fff; border-color:var(--accent); }
  .nat-foot .reset-btn { background:var(--surface-2); color:var(--text-dim); }

  .ukrow { border:1px solid var(--line-soft); border-radius:10px; padding:11px; margin-bottom:8px; border-left:4px solid var(--uk,#7f95ab); }
  .ukrow-head { display:flex; align-items:center; gap:9px; }
  .ukrow-head .uk-ico { font-size:16px; }
  .ukrow-head .uk-name { flex:1; min-width:0; font-size:14px; font-weight:650; }
  .ukrow-head .uk-count { font-size:11px; color:var(--text-faint); font-variant-numeric:tabular-nums; }
  .uk-swatches { display:flex; gap:6px; margin:10px 0 9px; flex-wrap:wrap; }
  .uk-sw { width:22px; height:22px; border-radius:6px; cursor:pointer; border:2px solid transparent; }
  .uk-sw.sel { border-color:var(--text); }

<script>
/* ============================================================
   HKL Standards v4 — Logik
   ============================================================ */
const DATA_URL='data/hkl_standards_export.json';
/* Hook: wird nach jedem store.set(key) aufgerufen. Der Server-Sync-Baustein
   hängt sich hier ein, um geänderte Schlüssel an /api/state zu schicken. */
let onStoreSet=null;
const store=(()=>{ let mem={},ok=false; try{localStorage.setItem('__t','1');localStorage.removeItem('__t');ok=true;}catch(e){ok=false;}
  return { get(k){try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return (k in mem)?mem[k]:null;}}, set(k,v){try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;} if(onStoreSet){try{onStoreSet(k);}catch(_){}} } }; })();
/* schreibt in den Store OHNE den Sync-Hook auszulösen (für eingehende
   Server-Daten – sonst würden wir Fremdänderungen sofort zurückspielen). */
function storeSetQuiet(k,v){ const h=onStoreSet; onStoreSet=null; try{ store.set(k,v); } finally { onStoreSet=h; } }
const $=(id)=>document.getElementById(id);
const esc=(s)=>(s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
const today=()=>new Date().toISOString().slice(0,10);
function loadJSON(k,def){ try{ const r=store.get(k); return r?JSON.parse(r):def; }catch(e){ return def; } }
function saveJSON(k,v){ store.set(k,JSON.stringify(v)); }

/* ─────────────────────────────────────────────────────────────
   BAUSTEIN 1 — KONFIGURATION (die einzige Quelle der Wahrheit)
   DEFAULT_NAT sind die Voreinstellungen im Code. Sie werden von
   deinen über die Oberfläche gemachten Änderungen überschrieben.
   ───────────────────────────────────────────────────────────── */
/* Passwort-Schutz (Komfort, keine echte Sicherheit). Start-Passwort: 1234567; in der App änderbar. */
const AUTH_DEFAULT_PW='1234567';
const AUTH_TTL=3600*1000; /* Verwaltungsmodus bleibt bis 1 Stunde Inaktivität aktiv */
function pwHash(s){ let h=5381; s=String(s); for(let i=0;i<s.length;i++){ h=(((h<<5)+h)+s.charCodeAt(i))>>>0; } return 'h'+h.toString(36); }
function getAuthHash(){ return store.get('hkl_authpw') || pwHash(AUTH_DEFAULT_PW); }
function checkPw(pw){ return pwHash(pw)===getAuthHash(); }
function setAuthPw(pw){ store.set('hkl_authpw', pwHash(pw)); }
function authValid(){ return Date.now() < (+(store.get('hkl_authuntil')||0)); }
function refreshAuth(){ if(ADMIN) store.set('hkl_authuntil', String(Date.now()+AUTH_TTL)); }
const DEFAULT_NAT=[
  {key:'material',    label:'Material',    color:'#34c98a', icon:'📦',  builtin:true, beschaffbar:true },
  {key:'geraet',      label:'Gerät',       color:'#e8b34a', icon:'🖥',  builtin:true, beschaffbar:true },
  {key:'medikament',  label:'Medikament',  color:'#bd8ce8', icon:'💊',  builtin:true, beschaffbar:false},
  {key:'hinweis',     label:'Hinweis',     color:'#7f95ab', icon:'ℹ️',  builtin:true, beschaffbar:false},
  {key:'ueberschrift',label:'Überschrift', color:'#3d9be0', icon:'▸',   builtin:true, beschaffbar:false},
];
function loadNatCfg(){
  const saved=loadJSON('hkl_natcfg',null);
  const items={}, order=[];
  DEFAULT_NAT.forEach(n=>{ items[n.key]={...n}; order.push(n.key); });
  if(saved&&saved.items){
    Object.keys(saved.items).forEach(k=>{ if(items[k]) items[k]={...items[k],...saved.items[k]}; else items[k]={beschaffbar:false,builtin:false,...saved.items[k],key:k}; });
    if(Array.isArray(saved.order)&&saved.order.length){ const o=saved.order.filter(k=>items[k]); order.length=0; o.forEach(k=>order.push(k)); Object.keys(items).forEach(k=>{ if(!order.includes(k)) order.push(k); }); }
  }
  return {items,order};
}
function saveNatCfg(){ store.set('hkl_natcfg',JSON.stringify({order:NATCFG.order,items:NATCFG.items})); }
function natList(){ return NATCFG.order.map(k=>({key:k,...NATCFG.items[k]})); }
function natOf(key){ return NATCFG.items[key]||{key,label:key,color:'#7f95ab',icon:'•',beschaffbar:false,builtin:false}; }
/* schreibt die Konfigurationsfarben als CSS-Variablen — die App liest sie überall */
function applyNatConfig(){ const root=document.documentElement; natList().forEach(n=>{ root.style.setProperty('--n-'+n.key, n.color); }); }
function natSlug(s){ let base=(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'kat'; let k=base,i=2; while(NATCFG.items[k]){k=base+'_'+i;i++;} return k; }

/* ─────────────────────────────────────────────────────────────
   BAUSTEIN — EIGENE INHALTE (Hinzufügen / Bearbeiten)
   Neue Standards und neue Material-/Geräte-Einträge werden in einer
   eigenen Ebene `hkl_additions` gespeichert und beim Laden über die
   (unveränderte) JSON-Basis gelegt. So bleiben die Quelldaten intakt,
   die Ergänzungen werden aber wie normale Inhalte angezeigt und – wie
   alle Änderungen – zentral auf dem Server geteilt.
     { standards:[ …vollständige Standard-Objekte… ],
       entries:{ "<stdId>|<rubrikIndex>": [ …neue Einträge… ] } }
   ───────────────────────────────────────────────────────────── */
function loadAdditions(){ const a=loadJSON('hkl_additions',{standards:[],entries:{}}); if(!Array.isArray(a.standards)) a.standards=[]; if(!a.entries||typeof a.entries!=='object') a.entries={}; return a; }
function saveAdditions(){ saveJSON('hkl_additions',ADDITIONS); }
/* Eindeutige, für onclick-Interpolation ungefährliche IDs ([a-z0-9] only). */
function newAid(){ return 'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
/* Wie natSlug, aber gegen eine beliebige Menge belegter IDs. `taken` ist ein
   Set oder ein Objekt; Ergebnis ist immer [a-z0-9_]+ (onclick-sicher). */
function addSlug(title,taken){ let base=(title||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'std';
  const has=k=>taken&&(taken.has?taken.has(k):(k in taken)); let k=base,i=2; while(has(k)){k=base+'_'+i;i++;} return k; }
/* Baut aus den Formularfeldern ein normalisiertes Eintrags-Objekt. Rein
   (kein DOM/Store) – daher testbar. `f.aid` muss übergeben werden. */
function makeAddEntry(f){ const name=(f.name||'').trim(); const menge=(f.menge||'').trim();
  const mz=menge?parseInt(menge,10):null;
  const val=(f.sizeVal||'').trim();
  const groessen=val?[{typ:(f.sizeTyp||'dimension'),wert:val,roh:val}]:[];
  const uk=(f.uk||'').trim()||null; const spez=(f.spez||'').trim()||null;
  return { roh_text:name, anzeige_text:name, menge:menge||null, menge_zahl:Number.isFinite(mz)?mz:null,
    natur:f.nat||'material', natur_konfidenz:'hoch', natur_merkmale:[], natur_manuell:null, unterkategorie:uk,
    spalte:0, groessen, spezifikation:spez, zusatz_markierung:null, material_key:name?name.toLowerCase():null,
    ist_fliesstext:false, _added:true, _aid:f.aid }; }
/* Legt die Ergänzungen über die Basis. Rein (base+add rein, neues DB raus). */
function mergeAdditions(base,add){
  const inject=(std)=>{ const rubs=std.rubriken||[]; let cloned=false;
    const newRubs=rubs.map((r,ri)=>{ const extra=add.entries[std.id+'|'+ri]; if(!extra||!extra.length) return r; cloned=true;
      return Object.assign({},r,{sub_bereiche:(r.sub_bereiche||[]).concat([{name:null,_added:true,eintraege:extra}])}); });
    return cloned?Object.assign({},std,{rubriken:newRubs}):std; };
  const baseStds=(base.standards||[]).map(inject);
  const addStds=(add.standards||[]).map(inject);
  return Object.assign({},base,{standards:baseStds.concat(addStds)}); }
/* Baut das sichtbare DB neu aus Basis + Ergänzungen und hält curStd frisch. */
function rebuildDB(){ if(!DB_BASE){ return; } DB=mergeAdditions(DB_BASE,ADDITIONS); mergeCustomIntoDB();
  if(curStd){ const c=DB.standards.find(s=>s.id===curStd.id); if(c) curStd=c; } }
function findAddEntry(sid,ri,aid){ const arr=ADDITIONS.entries[sid+'|'+ri]||[]; return arr.find(x=>x._aid===aid)||null; }

/* ─────────────────────────────────────────────────────────────
   BAUSTEIN — KATALOG (Geräte- & Material-Übersicht)
   Ein von den Standards unabhängiger Bestand aller Geräte und
   Materialien. Hier legt man Einträge einmalig an und pflegt sie;
   an anderer Stelle (in den Rubriken der Standards) lassen sie sich
   per „Aus Katalog übernehmen" einfügen. Gespeichert unter dem
   Schlüssel `hkl_catalog` und – wie alle Änderungen – zentral auf
   dem Server geteilt.
     { items:[ {id,name,nat,menge,sizeTyp,sizeVal,uk} … ] }
   ───────────────────────────────────────────────────────────── */
function loadCatalog(){ const c=loadJSON('hkl_catalog',{items:[]}); if(!c||typeof c!=='object'||!Array.isArray(c.items)) return {items:[]}; return c; }
function saveCatalog(){ saveJSON('hkl_catalog',CATALOG); }
/* Baut aus den Formularfeldern ein normalisiertes Katalog-Objekt. Rein
   (kein DOM/Store) – daher testbar. `f.id` muss übergeben werden. */
function makeCatalogItem(f){ const name=(f.name||'').trim(); const menge=(f.menge||'').trim(); const val=(f.sizeVal||'').trim(); const uk=(f.uk||'').trim();
  return { id:f.id, name, nat:f.nat||'material', menge:menge||null, sizeTyp:val?(f.sizeTyp||'dimension'):null, sizeVal:val||null, uk:uk||null }; }
/* Übersetzt ein Katalog-Objekt in ein Formular-Objekt (für Bearbeiten und
   für die Übernahme in Standards, die makeAddEntry füttert). Rein/testbar. */
function catalogToForm(item){ return { name:item.name||'', menge:item.menge||'', nat:item.nat||'material', sizeTyp:item.sizeTyp||'', sizeVal:item.sizeVal||'', uk:item.uk||'' }; }
/* Fügt ein Katalog-Objekt ein oder ersetzt das mit gleicher id. Gibt ein
   NEUES Array zurück (mutiert `items` nicht). Rein/testbar. */
function upsertCatalogItem(items,item){ const arr=(items||[]).slice(); const i=arr.findIndex(x=>x.id===item.id); if(i>=0) arr[i]=item; else arr.push(item); return arr; }
/* Entfernt das Katalog-Objekt mit dieser id. Gibt ein NEUES Array zurück. Rein/testbar. */
function removeCatalogItem(items,id){ return (items||[]).filter(x=>x.id!==id); }
/* Kanonischer Vergleichsschlüssel für „fast gleiche" Texte: Kleinschreibung,
   Umlaute gefaltet, alle Nicht-Alphanumerischen (Leerzeichen/Satzzeichen)
   entfernt. So gelten „Radial-Schleuse", „Radial Schleuse" und
   „radialschleuse" als derselbe Name. Rein/testbar. */
function canonCatalogName(s){ return (s==null?'':''+s).toLowerCase()
  .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
  .replace(/[^a-z0-9]+/g,''); }
/* Gruppiert Katalog-Einträge, die als Duplikate/fast-gleich gelten: gleiche
   Natur + gleicher kanonischer Name + gleiche kanonische Größe. Unterschiedliche
   Größen bleiben absichtlich getrennt (sonst ginge Info verloren). Rückgabe:
   Array von Gruppen (je ≥2 Einträge), Reihenfolge stabil nach erstem Auftreten.
   Einträge ohne Name werden nicht gruppiert. Rein/testbar. */
function findCatalogDuplicateGroups(items){
  const map=new Map(); const order=[];
  (items||[]).forEach(it=>{ const cn=canonCatalogName(it.name); if(!cn) return;
    const key=(it.nat||'material')+'|'+cn+'|'+canonCatalogName(it.sizeVal);
    if(!map.has(key)){ map.set(key,[]); order.push(key); } map.get(key).push(it); });
  return order.map(k=>map.get(k)).filter(g=>g.length>1);
}
/* Führt eine Gruppe gleicher Einträge zu EINEM zusammen: behält id, Name und
   Natur des ersten Eintrags, füllt fehlende Felder (menge/sizeVal/sizeTyp/uk)
   aus den weiteren Einträgen (erster nicht-leerer gewinnt). Rein/testbar. */
function mergeCatalogGroup(group){
  const g=(group||[]).slice(); const base=Object.assign({},g[0]);
  const filled=v=>v!=null&&v!=='';
  const firstWith=k=>g.find(it=>filled(it[k]));
  if(!filled(base.menge)){ const s=firstWith('menge'); base.menge=s?s.menge:null; }
  if(!filled(base.sizeVal)){ const s=firstWith('sizeVal'); if(s){ base.sizeVal=s.sizeVal; base.sizeTyp=s.sizeTyp||'dimension'; } else { base.sizeVal=null; base.sizeTyp=null; } }
  else if(!filled(base.sizeTyp)){ base.sizeTyp='dimension'; }
  if(!filled(base.uk)){ const s=firstWith('uk'); base.uk=s?s.uk:null; }
  return base;
}
/* Führt ALLE Duplikat-Gruppen zusammen. Behält die Array-Reihenfolge: der erste
   Eintrag jeder Gruppe wird durch das zusammengeführte Objekt ersetzt, die
   übrigen entfernt. Rückgabe {items,merged,groups}: neues Array, Zahl entfernter
   Einträge, Zahl der Gruppen. Rein/testbar. */
function mergeCatalogDuplicates(items){
  const groups=findCatalogDuplicateGroups(items);
  if(!groups.length) return { items:(items||[]).slice(), merged:0, groups:0 };
  const remove=new Set(); const mergedById=new Map(); let merged=0;
  groups.forEach(g=>{ mergedById.set(g[0].id,mergeCatalogGroup(g)); for(let i=1;i<g.length;i++){ remove.add(g[i].id); merged++; } });
  const out=[];
  (items||[]).forEach(it=>{ if(remove.has(it.id)) return; out.push(mergedById.has(it.id)?mergedById.get(it.id):it); });
  return { items:out, merged, groups:groups.length };
}
/* Erzeugt aus allen Standards eine Liste wiederverwendbarer Katalog-Objekte,
   damit ein Gerät/Material nur EINMAL zentral im Katalog gepflegt werden muss.
   Es werden nur beschaffbare Naturen (Geräte/Material) aus den Rubriken
   „geraete"/„material" berücksichtigt und über `nat|material_key` (bzw. Name)
   dedupliziert; die erste gefundene Größe dient als Vorgabe. Einträge, die es
   dem Namen nach (gleiche nat) schon im Katalog gibt, werden übersprungen.
   Rein/testbar: `newId` liefert eindeutige IDs, `isBeschaffbar(nat)` entscheidet
   über die Aufnahme. Rückgabe: neue Katalog-Objekte (Form wie makeCatalogItem). */
function buildCatalogFromStandards(standards,existing,newId,isBeschaffbar){
  const norm=s=>(s||'').trim().toLowerCase();
  const have=new Set((existing||[]).map(it=>(it.nat||'material')+'|'+norm(it.name)));
  const seen=new Set(); const out=[];
  (standards||[]).forEach(std=>{ (std.rubriken||[]).forEach(r=>{
    if(r.typ!=='material'&&r.typ!=='geraete') return;
    (r.sub_bereiche||[]).forEach(sb=>{ (sb.eintraege||[]).forEach(e=>{
      if(e.ist_fliesstext||e.natur==='ueberschrift') return;
      const nat=e.natur||'material'; if(!isBeschaffbar(nat)) return;
      const name=(e.anzeige_text||e.material_key||'').trim(); if(!name) return;
      const dedup=nat+'|'+(e.material_key?norm(e.material_key):norm(name));
      if(seen.has(dedup)) return; seen.add(dedup);
      if(have.has(nat+'|'+norm(name))) return; /* schon im Katalog gepflegt */
      const g=(e.groessen&&e.groessen[0])||null;
      out.push({ id:newId(), name, nat, menge:null,
        sizeTyp:g?(g.typ||'dimension'):null, sizeVal:g?(g.wert||g.roh||null):null, uk:null });
    }); });
  }); });
  return out;
}

      if(e.natur==='ueberschrift'){ startSeg(e.anzeige_text||e.roh_text); return; }
      if(settings.fliesstext===false&&e.ist_fliesstext) return;
      if(qeGet(e,cid,'hidden')===true) return;
      if(!cur) startSeg(null); cur.items.push({e,cid}); segOf[cid]=cur.segId; }); });
  const news=newEntriesFor(r,idx);
  if(news.length){ const nb={head:null,segId:'segnew',items:[]};
    news.forEach(n=>{ const cid='new|'+n.id; const e=newToEntry(n); if(qeGet(e,cid,'hidden')===true) return; nb.items.push({e,cid}); segOf[cid]='segnew'; });
    if(nb.items.length) blocks.push(nb); }
  blocks.forEach(b=>{ b.items=sortByOrder(b.items, orderKeyFor(idx,b.segId)); });
  return {blocks, segOf}; }
function moveEntry(dir){ const cid=sheetCid, e=sheetEntry; if(!cid||!e) return; const top=nav[nav.length-1]; if(!top||top.lvl!=='rub'){ showSheet(false); return; }
  const idx=top.idx; const r=curStd.rubriken[idx]; const isMatGer=(r.typ==='material'||r.typ==='geraete'); let list, okey;
  if(isMatGer){ const uk=canonUk(e,cid)||''; list=collectGroupCids(idx,uk).map(x=>x.cid); okey=orderKeyFor(idx,uk); }
  else { const seg=ablaufSegments(idx); const segId=seg.segOf[cid]; if(!segId){ showSheet(false); return; } const b=seg.blocks.find(x=>x.segId===segId); list=b.items.map(x=>x.cid); okey=orderKeyFor(idx,segId); }
  const pos=list.indexOf(cid); const j=pos+dir; if(pos<0||j<0||j>=list.length){ toast(dir<0?'Schon ganz oben':'Schon ganz unten'); return; }
  const t=list[pos]; list[pos]=list[j]; list[j]=t; ENTORD[okey]=list; saveENTORD(); showSheet(false); reRenderDetail(); }
let reviewed=loadJSON('hkl_reviewed',{});
let reassign=loadJSON('hkl_reassign',{});
let ukMap=loadJSON('hkl_ukmap',{});
let ukMeta=loadJSON('hkl_ukmeta',{});
let settings=Object.assign({menge:true,groessen:true,spez:true,lagerort:true,konfidenz:true,fliesstext:true}, loadJSON('hkl_settings',{}));
let collapsed={};
let UK_LIST=[];

function loadChecks(){ try{ const raw=store.get('hkl_checks'); if(!raw) return {}; const o=JSON.parse(raw); if(o.date!==today()){ store.set('hkl_checks',JSON.stringify({date:today(),checks:{}})); return {}; } return o.checks||{}; }catch(e){ return {}; } }
function saveChecks(){ store.set('hkl_checks',JSON.stringify({date:today(),checks:checks})); }

const cidOf=(sid,ri,si,ei)=>sid+'|'+ri+'|'+si+'|'+ei;
const effNatur=(e,cid)=>overrides[cid]||(e.material_key&&QE.mat[e.material_key]&&QE.mat[e.material_key].natur)||e.natur_manuell||e.natur;
const isHandled=(cid)=>!!reviewed[cid]||!!overrides[cid];
function rawUk(e,cid){ if(cid in reassign) return reassign[cid]; if(e.material_key&&QE.mat[e.material_key]&&('uk' in QE.mat[e.material_key])) return QE.mat[e.material_key].uk; return e.unterkategorie; }
function canonUk(e,cid){ const r=rawUk(e,cid); if(r==null||r==='') return null; return ukMap[r]||r; }
function ukMetaOf(name){ return ukMeta[name]||{}; }
function ukColorOf(name,idx){ const m=ukMetaOf(name); if(m.color) return m.color; return UK_PALETTE[(idx>=0?idx:0)%UK_PALETTE.length]; }
function ukIconOf(name){ const m=ukMetaOf(name); return m.icon||ukKeywordIcon(name); }

/* ============ Laden ============ */
async function load(){
  applyNatConfig();
  applyDesign();
  try{ const res=await fetch(DATA_URL,{cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status); DB=await res.json(); if(!DB||!Array.isArray(DB.standards)) throw new Error('Struktur ungültig'); }
  catch(e){ DB=DEMO; setTimeout(()=>toast('Keine Standards-Datei gefunden – Demodaten aktiv',true),400); }
  DB_BASE=DB; rebuildDB(); /* eigene Standards/Einträge (Server) + App-eigene Standards (lokal) über die Basis legen */
  buildMaterialIndex(); checkAdminHash(); applyAdminUI(); try{ history.replaceState({d:0},''); }catch(e){} applyDeepLink(); renderStandards(); updateBar();

/* ============ Material-Index ============ */
function buildMaterialIndex(){
  const map=new Map();
  DB.standards.forEach(std=>{ (std.rubriken||[]).forEach((rub,ri)=>{ (rub.sub_bereiche||[]).forEach((sb,si)=>{ (sb.eintraege||[]).forEach((e,ei)=>{
    if(e.ist_fliesstext) return; const cid=cidOf(std.id,ri,si,ei); if(qeGet(e,cid,'hidden')===true) return; const nat=effNatur(e,cid);
    if(!natOf(nat).beschaffbar) return; const key=e.material_key; if(!key) return;
    if(!map.has(key)) map.set(key,{key,name:e.anzeige_text||key,typ:nat,vorkommen:0,groessen:e.groessen||[]}); map.get(key).vorkommen++;
  }); }); }); });
  MAT_INDEX=[...map.values()].sort((a,b)=>a.name.localeCompare(b.name,'de'));
}

/* ============ Ebene 3: Detail ============ */
function sizeBadges(g){ if(!settings.groessen||!g||!g.length) return ''; return g.map(x=>`<span class="size-badge"><span class="st">${esc(sizeLabel(x.typ))}</span>${esc(x.wert)}</span>`).join(''); }
function specTags(spez){ if(!settings.spez||!spez) return ''; const arr=Array.isArray(spez)?spez:[spez]; return arr.map(s=>{ const loc=/^Standort:/i.test(s); return `<span class="tag ${loc?'tag-loc':'tag-spec'}">${loc?'📍 '+esc(s.replace(/^Standort:\s*/i,'')):esc(s)}</span>`; }).join(''); }

/* Eintrag-Karte. NEU: Farbe und Symbol kommen aus der Kategorien-Konfiguration (natOf). */
function entryCardHTML(e,cid,isMatGer){
  const nat=effNatur(e,cid); const info=natOf(nat); const done=checks[cid]?'done':'';
  const showThumb=!!info.beschaffbar;
  const care=showThumb?careMem[e.material_key]:null;
  const thumb=care&&care.photo?`<div class="e-thumb"><img src="${care.photo}" alt=""></div>`:(showThumb?`<div class="e-thumb">📷</div>`:'');
  const dn=qeGet(e,cid,'name'); const name=(dn!==undefined?dn:e.anzeige_text);
  const mv=qeGet(e,cid,'mengeVal'); const mengeEff=(mv!==undefined?mv:e.menge);
  const hasEdit=!!( (QE.cid[cid]&&Object.keys(QE.cid[cid]).length) || overrides[cid] || (cid in reassign) || (e.material_key&&QE.mat[e.material_key]&&Object.keys(QE.mat[e.material_key]).length) );
  const editedMark=(ADMIN&&hasEdit)?`<span class="edited-mark" title="manuell angepasst">✎</span>`:'';
  const important=qeGet(e,cid,'important')===true; const accent=qeGet(e,cid,'color'); const mHi=qeGet(e,cid,'mengeHi')===true;
  /* Menge/Größen/Spezifikation sind über das Bearbeiten-Formular und das Schnellmenü überschreibbar. */
  const gv=qeGet(e,cid,'groessen'); const groessenEff=(gv!==undefined?gv:e.groessen);
  const sv=qeGet(e,cid,'spez'); const spezEff=(sv!==undefined)?(sv?sv:null):e.spezifikation;
  let meta=''; meta+=sizeBadges(groessenEff); meta+=specTags(spezEff);
  if(ADMIN&&e.__new) meta+=`<span class="tag" style="color:var(--accent);background:rgba(61,155,224,.13)">neu</span>`;
  if(settings.lagerort&&showThumb) meta+= care&&care.loc?`<span class="tag tag-loc">📍 ${esc(care.loc)}</span>`:`<span class="tag tag-loc missing">📍 kein Lagerort</span>`;
  if(e.zusatz_markierung&&e.zusatz_markierung.fundstelle) meta+=`<span class="tag tag-zusatz">${esc(e.zusatz_markierung.fundstelle)}</span>`;
  const uncertain=(e.natur_konfidenz==='mittel'||e.natur_konfidenz==='niedrig');
  const conf=(settings.konfidenz&&uncertain&&!isHandled(cid))?`<span class="conf" title="Automatik unsicher (${esc(e.natur_konfidenz)}) – in Verwaltung prüfbar">⚠</span>`:'';
  const mbox = settings.menge ? (mengeEff?`<div class="mbox${mHi?' hi':''}">${esc(mengeEff)}</div>`:`<div class="mbox empty"></div>`) : '';
  const ico = isMatGer?`<div class="e-ico">${info.icon||'•'}</div>`:'';
  const cls = (isMatGer?'':'step')+(important?' important':'');
  const borderColor = accent?esc(accent):(isMatGer?`var(--n-${esc(nat)})`:`var(--n-hinweis)`);
  const star = important?`<span class="imp-star">⭐</span>`:'';
  const addedTag = e._added?`<span class="added-tag">neu</span>`:'';
  return `<div class="entry ${cls} ${done}" id="e-${esc(cid)}" style="border-left-color:${borderColor}"><div class="entry-row"><div class="chk">✓</div>${mbox}${ico}${showThumb?thumb:''}<div class="e-main"><div class="e-top"><div class="e-text">${star}${esc(name)}${addedTag}</div>${editedMark}${conf}</div>${meta?`<div class="e-meta">${meta}</div>`:''}</div></div></div>`;
}

function openRubrik(idx,silent){ const r=curStd.rubriken[idx]; if(!silent){ nav.push({lvl:'rub',idx}); try{ history.pushState({d:2,id:curStd.id,idx},''); }catch(e){} }
  const isMatGer=(r.typ==='material'||r.typ==='geraete'); let html='';
  if(isMatGer){
    let lg=''; natList().forEach(n=>{ lg+=`<div class="lg-row"><span class="lg-swatch" style="background:${n.color}"></span>${esc(n.label)}</div>`; });
    html+=`<details class="legend"><summary>◐ Farb-Legende</summary><div class="legend-body">
      <div class="lg-row"><span class="lg-mbox">2×</span>Menge (Stückzahl, links)</div>${lg}
      <div class="lg-row"><span class="lg-size">6F</span>Größe (French, Länge, Ø, Volumen …)</div>
      <div class="lg-row"><span style="color:var(--warn)">⚠</span>Automatik unsicher – in Verwaltung prüfbar</div></div></details>`;
  }
  if(isMatGer){
    const groupsMap=new Map(); let appear=0;
    (r.sub_bereiche||[]).forEach((sb,si)=>{ (sb.eintraege||[]).forEach((e,ei)=>{
      if(e.natur==='ueberschrift') return; if(settings.fliesstext===false && e.ist_fliesstext) return;
      const cid=cidOf(curStd.id,idx,si,ei); if(qeGet(e,cid,'hidden')===true) return; const uk=canonUk(e,cid); const gkey=uk||'\u0000null';
      if(!groupsMap.has(gkey)){ groupsMap.set(gkey,{uk:uk,first:appear++,entries:[]}); }
      groupsMap.get(gkey).entries.push({e,cid});
    }); });
    /* Selbst angelegte Einträge dieses Standards/dieser Rubrik einbinden */
    newEntriesFor(r,idx).forEach(n=>{
      const cid='new|'+n.id; const e=newToEntry(n); if(qeGet(e,cid,'hidden')===true) return;
      const uk=canonUk(e,cid); const gkey=uk||'\u0000null';
      if(!groupsMap.has(gkey)){ groupsMap.set(gkey,{uk:uk,first:appear++,entries:[]}); }
      groupsMap.get(gkey).entries.push({e,cid});
    });
    const addBtn=(uk)=>ADMIN?`<button class="sheet-pick-btn" style="margin:2px 0 10px" onclick="addNewEntry('${rubIdxKey(r,idx)}',${uk==null?'null':`decodeURIComponent('${encodeURIComponent(uk)}')`},'material')">＋ Eintrag hinzufügen</button>`:'';
    let groups=[...groupsMap.values()];
    groups.forEach(g=>{ g.entries=sortByOrder(g.entries, orderKeyFor(idx,(g.uk||''))); });
    groups.sort((a,b)=>{ const oa=(a.uk&&ukMetaOf(a.uk).order!=null)?ukMetaOf(a.uk).order:a.first; const ob=(b.uk&&ukMetaOf(b.uk).order!=null)?ukMetaOf(b.uk).order:b.first; return oa-ob; });
    const named=groups.filter(g=>g.uk); const nullG=groups.find(g=>!g.uk);
    if(nullG && named.length===0){ nullG.entries.forEach(x=>{ html+=entryCardHTML(x.e,x.cid,true); }); html+=addBtn(null); }
    else {
      if(nullG){ nullG.entries.forEach(x=>{ html+=entryCardHTML(x.e,x.cid,true); }); }
      html+=addBtn(null);
      named.forEach((g)=>{ const gidx=UK_LIST.indexOf(g.uk); const col=ukColorOf(g.uk,gidx>=0?gidx:g.first); const ico=ukIconOf(g.uk);
        const ckey=idx+':'+g.uk; const isCol=!!collapsed[ckey];
        html+=`<div class="uksec ${isCol?'collapsed':''}" style="--uk:${col}"><div class="uksec-head" onclick="toggleUk('${esc(ckey)}')"><span class="uksec-ico">${ico}</span><span class="uksec-name">${esc(g.uk)}</span><span class="uksec-count">${g.entries.length}</span><span class="uksec-arrow">▾</span></div><div class="uksec-body">`;
        g.entries.forEach(x=>{ html+=entryCardHTML(x.e,x.cid,true); });
        html+=addBtn(g.uk);
        html+=`</div></div>`;
      });
    }
  } else {
    const {blocks}=ablaufSegments(idx);
    blocks.forEach(b=>{ if(b.head) html+=`<div class="sub-head">${esc(b.head)}</div>`;
      b.items.forEach(x=>{ html+=entryCardHTML(x.e,x.cid,false); }); });
    if(ADMIN) html+=`<button class="sheet-pick-btn" style="margin:6px 0 10px" onclick="addNewEntry('${rubIdxKey(r,idx)}',null,'hinweis')">＋ Schritt hinzufügen</button>`;
  }
  const body=html||`<div class="empty"><div class="ei">📄</div><h3>Keine Einträge</h3><p>Diese Rubrik enthält keine Positionen.</p></div>`;
  const adoptBtn=isMatGer?`<button class="add-entry-btn" onclick="startAdoptCatalog()">⬇ Aus Katalog übernehmen</button>`:'';
  $('scr-detail').innerHTML=body+`<button class="add-entry-btn" onclick="startAddEntry()">＋ Eintrag hinzufügen</button>`+adoptBtn;
  show('scr-detail'); setBar(r.name,curStd.titel+' · '+curStd.gruppe,true);
}
/* Startet das Hinzufügen eines Eintrags in der aktuell offenen Rubrik.
   Liest Standard/Rubrik aus dem Navigationszustand (keine Nutzertexte im onclick). */
function startAddEntry(){ const top=nav[nav.length-1]; if(!top||top.lvl!=='rub'||!curStd) return;
  const r=curStd.rubriken[top.idx]; const defaultNat=r.typ==='geraete'?'geraet':(r.typ==='material'?'material':'hinweis');
  openEntryForm({kind:'add',sid:curStd.id,ri:top.idx,defaultNat}); }
/* Übernahme aus dem Katalog: Auswahl-Sheet öffnen, ausgewählten Eintrag als
   neuen (eigenen) Eintrag in die aktuell offene Rubrik einfügen. */
function startAdoptCatalog(){ const top=nav[nav.length-1]; if(!top||top.lvl!=='rub'||!curStd) return;
  if(!CATALOG.items.length){ toast('Katalog ist leer – erst im Katalog anlegen',true); return; }
  renderCatalogPickSheet(); showSheet(true); }
function renderCatalogPickSheet(){ const items=CATALOG.items.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','de'));
  let h=`<div class="sheet-grip"></div><div class="sheet-title">Aus Katalog übernehmen</div><div class="sheet-pick">`;
  items.forEach(it=>{ const info=natOf(it.nat); const g=(it.sizeVal?[{typ:it.sizeTyp||'dimension',wert:it.sizeVal,roh:it.sizeVal}]:[]); const sizes=g.length?' '+sizeBadges(g):'';
    h+=`<button class="sheet-pick-btn" onclick="adoptCatalogItem('${esc(it.id)}')"><span style="width:14px;height:14px;border-radius:4px;background:${info.color};display:inline-block"></span>${esc(it.name)}<span class="ps-sub">${esc(info.label)}${it.menge?' · '+esc(it.menge):''}${sizes}</span></button>`; });
  h+=`</div><button class="sheet-close" onclick="showSheet(false)">Abbrechen</button>`;

let catalogFilter='alle';
function renderCatalog(){ const box=$('scr-catalog');
  let list=CATALOG.items.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','de'));

  else if(!list.length){ html+=`<div class="empty"><div class="ei">🔍</div><h3>Nichts in diesem Filter</h3><p>Wechsle den Filter.</p></div>`; }
  list.forEach(it=>{ const info=natOf(it.nat); const g=(it.sizeVal?[{typ:it.sizeTyp||'dimension',wert:it.sizeVal,roh:it.sizeVal}]:[]);

/* Übernimmt alle wiederverwendbaren Geräte/Materialien aus den vorhandenen
   Standards in den Katalog – so pflegt man sie danach nur an EINER Stelle. */
function generateCatalogFromStandards(){
  const isB=nat=>natOf(nat).beschaffbar;

  if(!neu.length){ toast('Katalog ist bereits vollständig'); return; }
  if(!confirm(neu.length+' neue Geräte/Materialien aus den Standards in den Katalog übernehmen?')) return;
  neu.forEach(it=>{ CATALOG.items=upsertCatalogItem(CATALOG.items,it); });
  saveCatalog(); renderCatalog(); updateBar(); toast(neu.length+' übernommen');

/* Findet Duplikate/fast-gleiche Katalog-Einträge und führt sie nach Rückfrage
   zusammen. Sicher: bereits in Standards übernommene Einträge sind Kopien und
   bleiben unberührt. */
function mergeCatalogDuplicatesUI(){
  const groups=findCatalogDuplicateGroups(CATALOG.items);
  if(!groups.length){ toast('Keine Duplikate gefunden'); return; }
  const total=groups.reduce((n,g)=>n+g.length,0);
  const preview=groups.slice(0,8).map(g=>'• '+g.map(it=>it.name).join(' + ')).join('\n');
  const more=groups.length>8?`\n… und ${groups.length-8} weitere`:'';
  if(!confirm(`${groups.length} Gruppe(n) mit zusammen ${total} fast gleichen Einträgen zusammenführen?\n\n${preview}${more}`)) return;
  const res=mergeCatalogDuplicates(CATALOG.items);
  CATALOG.items=res.items; saveCatalog(); renderCatalog(); updateBar(); toast(res.merged+' Duplikat(e) zusammengeführt');
}

function allMatGerEntries(){ const out=[]; DB.standards.forEach(std=>{ (std.rubriken||[]).forEach((r,ri)=>{ if(r.typ!=='material'&&r.typ!=='geraete') return; (r.sub_bereiche||[]).forEach((sb,si)=>{ (sb.eintraege||[]).forEach((e,ei)=>{ if(e.natur==='ueberschrift') return; out.push({e,cid:cidOf(std.id,ri,si,ei),std,rubrik:r.name}); }); }); }); }); return out; }
function computeUkList(){ const cnt=new Map(); const first=new Map(); let i=0;
  allMatGerEntries().forEach(x=>{ const uk=canonUk(x.e,x.cid); if(!uk) return; cnt.set(uk,(cnt.get(uk)||0)+1); if(!first.has(uk)) first.set(uk,i++); });
  let names=[...cnt.keys()]; names.sort((a,b)=>{ const oa=ukMetaOf(a).order!=null?ukMetaOf(a).order:first.get(a); const ob=ukMetaOf(b).order!=null?ukMetaOf(b).order:first.get(b); return oa-ob; });
  UK_LIST=names; return {names,cnt}; }
function collectUncertain(){ const out=[]; allMatGerEntries().forEach(x=>{ if(qeGet(x.e,x.cid,'hidden')===true) return; const unc=(x.e.natur_konfidenz==='mittel'||x.e.natur_konfidenz==='niedrig'); if(unc||overrides[x.cid]) out.push(x); }); return out; }
function collectHidden(){ const byCid=[]; const byMat=[]; const byStd=[]; const byRub=[];
  DB.standards.forEach(std=>{ (std.rubriken||[]).forEach((r,ri)=>{ (r.sub_bereiche||[]).forEach((sb,si)=>{ (sb.eintraege||[]).forEach((e,ei)=>{ const cid=cidOf(std.id,ri,si,ei); if(QE.cid[cid]&&QE.cid[cid].hidden){ byCid.push({cid,e,std,rubrik:r.name}); } }); }); }); });
  Object.keys(QE.mat).forEach(mk=>{ if(QE.mat[mk]&&QE.mat[mk].hidden) byMat.push(mk); });
  DB.standards.forEach(s=>{ if(stdHidden(s)) byStd.push(s); });
  Object.keys(RUBE).forEach(k=>{ if(!RUBE[k]||!RUBE[k].hidden) return; const sid=k.split('|')[0]; const part=k.slice(sid.length+1); const s=DB.standards.find(x=>x.id===sid); if(!s) return;
    let r=null; if(part.indexOf('nr:')===0){ r=s.rubriken.find(x=>x.__nrid===part.slice(3)); } else { r=s.rubriken[+part]; }
    byRub.push({key:k,std:s,name:(RUBE[k].name)||(r?r.name:part)}); });
  return {byCid,byMat,byStd,byRub}; }

/* ============ Datensicherung: Export/Import aller Anpassungen ============ */
const BACKUP_KEYS=['hkl_natcfg','hkl_overrides','hkl_reviewed','hkl_reassign','hkl_ukmap','hkl_ukmeta','hkl_settings','hkl_qedits','hkl_newentries','hkl_newstd','hkl_newrub','hkl_stdedits','hkl_rubedits','hkl_entryorder','hkl_txt','hkl_design','hkl_grpord','hkl_rubicon','hkl_authpw','hkl_theme'];
function buildBackup(){ const daten={}; BACKUP_KEYS.forEach(k=>{ const raw=store.get(k); if(raw==null) return; try{ daten[k]=JSON.parse(raw); }catch(e){ daten[k]=raw; } });
  return { __hkl:'hkl-anpassungen', version:1, erstellt:new Date().toISOString(), daten }; }
function applyBackup(obj){ if(!obj||obj.__hkl!=='hkl-anpassungen'||!obj.daten) throw new Error('ungueltig');
  BACKUP_KEYS.forEach(k=>{ if(k in obj.daten){ const v=obj.daten[k]; store.set(k, (typeof v==='string')?v:JSON.stringify(v)); } }); }
function exportBackup(){ try{ const obj=buildBackup(); const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='hkl-anpassungen-'+today()+'.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast('Sicherung heruntergeladen'); }catch(e){ toast('Export fehlgeschlagen',true); } }
function importBackupFile(ev){ const f=ev.target.files&&ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const obj=JSON.parse(r.result); if(!obj||obj.__hkl!=='hkl-anpassungen'){ toast('Keine gültige Sicherungsdatei',true); return; }
    if(!confirm('Sicherung einspielen? Die aktuellen Anpassungen auf diesem Gerät werden durch die Datei ersetzt.')) return;
    applyBackup(obj); toast('Sicherung eingespielt – App lädt neu'); setTimeout(()=>{ try{ location.reload(); }catch(e){} },700);
  }catch(e){ toast('Datei nicht lesbar',true); } }; r.readAsText(f); }

  rubs.forEach(nm=>{ const ic=RUBICON[nm]||rubrikIcon(nm,''); html+=`<div class="ukrow"><div class="ukrow-head"><span class="uk-ico">${ic}</span><span class="uk-name">${esc(nm)}</span></div><div class="uk-actions"><button onclick="editRubIcon('${esc(nm)}')">Symbol ändern</button></div></div>`; });
  html+=`<p class="hint">Das Symbol gilt für alle Rubriken dieses Namens (z. B. „Saal und Geräte" in jedem Standard).</p></div></details>`;

  /* Panel: Kategorien (Naturen) — NEU, der Editor der Konfiguration */
  html+=`<details class="vpanel"><summary>🎨 Kategorien (Naturen) <span class="vp-hint">${natList().length}</span></summary><div class="vpanel-body">`;
  natList().forEach(n=>{
    html+=`<div class="natrow" style="border-left-color:${n.color}">
      <div class="natrow-head"><span class="nat-ico">${n.icon}</span><input class="txtinp" value="${esc(n.label)}" onchange="setNatLabel('${esc(n.key)}',this.value)"><input type="color" class="colinp" value="${n.color}" onchange="setNatColor('${esc(n.key)}',this.value)"></div>
      <div class="nat-actions"><button onclick="editNatIcon('${esc(n.key)}')">Symbol: ${n.icon}</button>${n.builtin?'':`<button class="danger-btn" onclick="deleteNat('${esc(n.key)}')">Löschen</button>`}</div>
    </div>`;
  });
  html+=`<div class="nat-foot"><button class="add-btn" onclick="addNat()">＋ Neue Kategorie</button><button class="reset-btn" onclick="resetNatCfg()">Zurücksetzen</button></div>
    <p class="hint">Farbe: auf das Farbfeld tippen (Farbwähler öffnet sich). Name: Feld antippen und tippen. Symbol: Knopf antippen und ein Emoji eingeben. Deine Änderungen wirken sofort überall in der App und werden zentral auf dem Server gespeichert (auf allen Geräten geteilt).</p></div></details>`;

  /* Panel: Unterkategorien verwalten */
  html+=`<details class="vpanel"><summary>🗂 Unterkategorien verwalten <span class="vp-hint">${names.length} Gruppen</span></summary><div class="vpanel-body">`;
  if(names.length===0) html+=`<p class="hint">Keine Unterkategorien erkannt.</p>`;
  names.forEach((name,i)=>{ const col=ukColorOf(name,i); const ico=ukIconOf(name);
    const sw=UK_PALETTE.map(c=>`<span class="uk-sw ${c===col?'sel':''}" style="background:${c}" onclick="setUkColor(${i},'${c}')"></span>`).join('');
    html+=`<div class="ukrow" style="--uk:${col}"><div class="ukrow-head"><span class="uk-ico">${ico}</span><span class="uk-name">${esc(name)}</span><span class="uk-count">${cnt.get(name)||0}×</span></div>
      <div class="uk-swatches">${sw}</div>
      <div class="uk-actions"><button onclick="renameUk(${i})">Umbenennen / Zusammenführen</button><button class="icon" onclick="moveUk(${i},-1)">▲</button><button class="icon" onclick="moveUk(${i},1)">▼</button></div></div>`; });
  html+=`<p class="hint">Tipp: Beim Umbenennen einen bereits vorhandenen Namen eingeben = zwei Gruppen zusammenführen. Einzelne Einträge umhängen: unten in „Einstufung prüfen".</p></div></details>`;

  /* Panel: Ausgeblendete Einträge (Wiederherstellung) */
  const hid=collectHidden(); const hidTotal=hid.byCid.length+hid.byMat.length+hid.byStd.length+hid.byRub.length;
  html+=`<details class="vpanel"><summary>🗑 Ausgeblendete Einträge <span class="vp-hint">${hidTotal}</span></summary><div class="vpanel-body">`;
  if(hidTotal===0) html+=`<p class="hint">Nichts ausgeblendet.</p>`;
  hid.byStd.forEach(s=>{ html+=`<div class="ukrow"><div class="ukrow-head"><span class="uk-name">${esc(stdTitel(s))}</span><span class="uk-count">Standard</span></div><div class="uk-actions"><button onclick="restoreStd('${esc(s.id)}')">Wiederherstellen</button></div></div>`; });
  hid.byRub.forEach(x=>{ html+=`<div class="ukrow"><div class="ukrow-head"><span class="uk-name">${esc(x.name)}</span><span class="uk-count">Rubrik</span></div><div class="vw-ctx">${esc(stdTitel(x.std))}</div><div class="uk-actions"><button onclick="restoreRub('${esc(x.key)}')">Wiederherstellen</button></div></div>`; });
  hid.byMat.forEach(mk=>{ html+=`<div class="ukrow"><div class="ukrow-head"><span class="uk-name">${esc(mk)}</span><span class="uk-count">überall</span></div><div class="uk-actions"><button onclick="restoreMat('${esc(mk)}')">Wiederherstellen</button></div></div>`; });
  hid.byCid.forEach(x=>{ html+=`<div class="ukrow"><div class="ukrow-head"><span class="uk-name">${esc(x.e.anzeige_text||x.e.roh_text)}</span></div><div class="vw-ctx">${esc(x.std.titel)} · ${esc(x.rubrik)}</div><div class="uk-actions"><button onclick="restoreCid('${esc(x.cid)}')">Wiederherstellen</button></div></div>`; });
  html+=`</div></details>`;

  /* Panel-los: Einstufung prüfen (Prüf-Workflow) */
  const all=collectUncertain(); const done=all.filter(x=>isHandled(x.cid)).length; const pct=all.length?Math.round(done/all.length*100):0;
  let list=all;
  if(admState==='offen') list=all.filter(x=>!isHandled(x.cid));
  if(admState==='erledigt') list=all.filter(x=>isHandled(x.cid));
  if(admNat!=='alle') list=list.filter(x=>effNatur(x.e,x.cid)===admNat);
  html+=`<div class="banner"><h2>${esc(txt('pruefTitle'))}</h2><p>Unsichere Einträge (mittlere/niedrige Konfidenz). Kategorie korrigieren, Unterkategorie zuweisen oder als „geprüft" bestätigen – dann verschwinden sie aus „Offen".<br><b>Hinweis:</b> Korrekturen werden zentral auf dem Server gespeichert und auf allen Geräten geteilt.</p><div class="prog"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-txt">${done} von ${all.length} erledigt (${pct} %)</div></div></div>
  <div class="filter-row"><button class="${admState==='offen'?'on':''}" onclick="setAdmState('offen')">Offen</button><button class="${admState==='erledigt'?'on':''}" onclick="setAdmState('erledigt')">Erledigt</button><button class="${admState==='alle'?'on':''}" onclick="setAdmState('alle')">Alle</button></div>`;
  const natFilters=['alle'].concat(natList().filter(n=>n.key!=='ueberschrift').map(n=>n.key));
  html+=`<div class="filter-row">`+natFilters.map(k=>`<button class="${admNat===k?'on':''}" onclick="setAdmNat('${esc(k)}')">${k==='alle'?'Alle':esc(natOf(k).label)}</button>`).join('')+`</div>`;
  if(list.length===0) html+=`<div class="empty"><div class="ei">✓</div><h3>Nichts zu prüfen</h3><p>In diesem Filter gibt es keine Einträge.</p></div>`;
  list.slice(0,300).forEach(x=>{ const nat=effNatur(x.e,x.cid); const isOv=!!overrides[x.cid]; const isRev=!!reviewed[x.cid]; const uk=canonUk(x.e,x.cid); const cur=natOf(nat);
    const setBtns=natList().map(n=>`<button class="${nat===n.key?'sel':''}" style="color:${n.color}" onclick="setNatur('${esc(x.cid)}','${esc(n.key)}')">${esc(n.label)}</button>`).join('');
    const opts=['<option value="">— ohne —</option>'].concat(UK_LIST.map(u=>`<option value="${esc(u)}" ${uk===u?'selected':''}>${esc(u)}</option>`)).join('');
    html+=`<div class="vwrow ${isHandled(x.cid)?'done':''}"><div class="vw-txt">${esc(x.e.anzeige_text||x.e.roh_text)}</div><div class="vw-ctx">${esc(x.std.titel)} · ${esc(x.rubrik)} · Konfidenz ${esc(x.e.natur_konfidenz)}${isOv?'<span class="vw-badge override">korrigiert</span>':''}${isRev?'<span class="vw-badge reviewed">geprüft</span>':''}</div>
      ${sizeBadges(x.e.groessen)?`<div class="e-meta" style="margin-top:8px">${sizeBadges(x.e.groessen)}</div>`:''}
      <div class="vw-lbl">Kategorie: <span class="nat-chip" style="color:${cur.color};background:${cur.color}22">${esc(cur.label)}</span></div><div class="vw-set">${setBtns}</div>
      <div class="vw-lbl">Unterkategorie</div><select class="vw-sel" onchange="reassignEntry('${esc(x.cid)}',this.value)">${opts}</select>
      <div class="vw-foot"><button class="${isRev?'':'done-btn'}" onclick="toggleReviewed('${esc(x.cid)}')">${isRev?'↺ wieder öffnen':'✓ geprüft'}</button><button onclick="hideCid('${esc(x.cid)}')">🗑 Ausblenden</button></div></div>`; });
  if(list.length>300) html+=`<div class="foot">Zeige erste 300 von ${list.length}. Filter nutzen.</div>`;
  box.innerHTML=html;
}
function setSetting(k,v){ settings[k]=v; saveJSON('hkl_settings',settings); }
function setAdmState(s){ admState=s; renderAdmin(); }
function setAdmNat(n){ admNat=n; renderAdmin(); }
function setNatur(cid,nat){ const e=findEntry(cid); if(e&&e.natur===nat) delete overrides[cid]; else overrides[cid]=nat; saveJSON('hkl_overrides',overrides); buildMaterialIndex(); renderAdmin(); }
function toggleReviewed(cid){ if(reviewed[cid]) delete reviewed[cid]; else reviewed[cid]=true; saveJSON('hkl_reviewed',reviewed); renderAdmin(); }
function reassignEntry(cid,val){ if(val==='') reassign[cid]=null; else reassign[cid]=val; saveJSON('hkl_reassign',reassign); computeUkList(); renderAdmin(); }
function findEntry(cid){ if(cid&&cid.indexOf('new|')===0){ const n=NEW.find(x=>('new|'+x.id)===cid); return n?newToEntry(n):null; } const p=cid.split('|'); const s=DB.standards.find(x=>x.id===p[0]); if(!s) return null; try{ return s.rubriken[+p[1]].sub_bereiche[+p[2]].eintraege[+p[3]]; }catch(e){ return null; } }

/* ─── Kategorien-Editor: schreibt in die Konfiguration + speichert ─── */
function setNatLabel(key,val){ if(!NATCFG.items[key]) return; NATCFG.items[key].label=(val||'').trim()||NATCFG.items[key].label; saveNatCfg(); renderAdmin(); }
function setNatColor(key,val){ if(!NATCFG.items[key]) return; NATCFG.items[key].color=val; saveNatCfg(); applyNatConfig(); buildMaterialIndex(); renderAdmin(); }
function editNatIcon(key){ if(!NATCFG.items[key]) return; const cur=NATCFG.items[key].icon||''; const v=prompt('Symbol (Emoji) für diese Kategorie:',cur); if(v==null) return; NATCFG.items[key].icon=(v.trim()||cur); saveNatCfg(); renderAdmin(); }
function addNat(){ const label=prompt('Name der neuen Kategorie:',''); if(label==null||!label.trim()) return; const key=natSlug(label); const color=UK_PALETTE[NATCFG.order.length%UK_PALETTE.length];
  NATCFG.items[key]={key,label:label.trim(),color,icon:'🏷️',builtin:false,beschaffbar:false}; NATCFG.order.push(key); saveNatCfg(); applyNatConfig(); renderAdmin(); toast('Kategorie angelegt'); }
function deleteNat(key){ if(!NATCFG.items[key]||NATCFG.items[key].builtin) return; if(!confirm('Kategorie „'+NATCFG.items[key].label+'" löschen? Einträge, die du ihr manuell zugewiesen hast, fallen auf ihre ursprüngliche Kategorie zurück.')) return;
  delete NATCFG.items[key]; NATCFG.order=NATCFG.order.filter(k=>k!==key);
  Object.keys(overrides).forEach(cid=>{ if(overrides[cid]===key) delete overrides[cid]; }); saveJSON('hkl_overrides',overrides);
  saveNatCfg(); applyNatConfig(); buildMaterialIndex(); renderAdmin(); toast('Kategorie gelöscht'); }
function resetNatCfg(){ if(!confirm('Alle Kategorie-Anpassungen (Namen, Farben, Symbole, eigene Kategorien) auf die Voreinstellung zurücksetzen?')) return;
  store.set('hkl_natcfg',JSON.stringify({})); NATCFG=loadNatCfg(); saveNatCfg(); applyNatConfig(); buildMaterialIndex(); renderAdmin(); toast('Zurückgesetzt'); }

/* Unterkategorie-Operationen */
function renameUk(i){ const oldName=UK_LIST[i]; if(oldName==null) return;
  const nn=prompt('Unterkategorie umbenennen (vorhandenen Namen eingeben = zusammenführen):',oldName); if(nn==null) return; const newName=nn.trim(); if(!newName||newName===oldName) return;
  Object.keys(ukMap).forEach(raw=>{ if(ukMap[raw]===oldName) ukMap[raw]=newName; }); ukMap[oldName]=newName;
  Object.keys(reassign).forEach(cid=>{ if(reassign[cid]===oldName) reassign[cid]=newName; });
  const metaOld=ukMeta[oldName]; if(metaOld){ if(!ukMeta[newName]) ukMeta[newName]=metaOld; delete ukMeta[oldName]; }
  saveJSON('hkl_ukmap',ukMap); saveJSON('hkl_reassign',reassign); saveJSON('hkl_ukmeta',ukMeta);
  computeUkList(); renderAdmin(); toast('Unterkategorie aktualisiert'); }
function setUkColor(i,color){ const name=UK_LIST[i]; if(name==null) return; ukMeta[name]=Object.assign({},ukMeta[name],{color}); saveJSON('hkl_ukmeta',ukMeta); renderAdmin(); }
function moveUk(i,dir){ computeUkList(); const names=UK_LIST.slice(); const j=i+dir; if(j<0||j>=names.length) return;
  names.forEach((n,k)=>{ ukMeta[n]=Object.assign({},ukMeta[n],{order:k}); });
  const a=names[i], b=names[j]; const oa=ukMeta[a].order; ukMeta[a].order=ukMeta[b].order; ukMeta[b].order=oa;
  saveJSON('hkl_ukmeta',ukMeta); computeUkList(); renderAdmin(); }

/* ============ Formulare: Hinzufügen / Bearbeiten ============ */
const SIZE_TYPES=['french','laenge','durchmesser','volumen','dimension','naht','groesse_kuerzel','typcode','durchmesser+french'];
function closeForm(){ if(!formCtx) return; const b=formCtx.back; formCtx=null; if(b) b(); }
function natPickHTML(sel,onlyProc){ const items=onlyProc?natList().filter(n=>n.beschaffbar):natList(); return `<div class="natpick" id="fNatWrap" data-nat="${esc(sel)}">`+items.map(n=>`<button type="button" data-nat="${esc(n.key)}" style="color:${n.color}" class="${n.key===sel?'sel':''}" onclick="pickNat(this)">${esc(n.icon||'•')} ${esc(n.label)}</button>`).join('')+`</div>`; }
function pickNat(btn){ const p=btn.parentElement; p.querySelectorAll('button').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); p.dataset.nat=btn.dataset.nat; }
function sizeTypOptionsHTML(sel){ return `<option value="">— keine Größe —</option>`+SIZE_TYPES.map(t=>`<option value="${esc(t)}" ${t===sel?'selected':''}>${esc(sizeLabel(t))}</option>`).join(''); }

/* Liest die effektiven (ggf. per Overlay bearbeiteten) Feldwerte eines
   Eintrags in ein Formular-Objekt. Bei Basis-Einträgen `cid` mitgeben. */
function entryToForm(e,cid){ const hasCid=(cid!==undefined&&cid!==null);
  const gv=hasCid?qeGet(e,cid,'groessen'):undefined; const groessen=(gv!==undefined?gv:e.groessen)||[]; const g=groessen[0]||null;
  const nv=hasCid?qeGet(e,cid,'name'):undefined; const name=(nv!==undefined?nv:e.anzeige_text)||'';
  const mvv=hasCid?qeGet(e,cid,'mengeVal'):undefined; const menge=(mvv!==undefined?mvv:e.menge)||'';
  const nat=hasCid?effNatur(e,cid):(e.natur||'material');
  const uk=hasCid?(canonUk(e,cid)||''):(e.unterkategorie||'');
  return {name,menge,nat,sizeTyp:g?g.typ:'',sizeVal:g?g.wert:'',uk}; }

/* desc: {kind:'add',sid,ri,defaultNat} | {kind:'editAdd',sid,ri,aid} | {kind:'editBase',cid}
        | {kind:'catalog'} | {kind:'editCatalog',id}
   optional desc.back overschreibt den Rücksprung (Standard: zurück zur Rubrik). */
function openEntryForm(desc){
  const isCatalog=(desc.kind==='catalog'||desc.kind==='editCatalog');
  let cur={name:'',menge:'',nat:desc.defaultNat||'material',sizeTyp:'',sizeVal:'',uk:''}; let title='Eintrag hinzufügen';
  if(desc.kind==='editAdd'){ const e=findAddEntry(desc.sid,desc.ri,desc.aid); if(!e){ toast('Eintrag nicht gefunden',true); return; } cur=entryToForm(e); title='Eintrag bearbeiten'; }
  else if(desc.kind==='editBase'){ const e=findEntry(desc.cid); if(!e){ toast('Eintrag nicht gefunden',true); return; } cur=entryToForm(e,desc.cid); title='Eintrag bearbeiten'; }
  else if(desc.kind==='editCatalog'){ const it=findCatalogItem(desc.id); if(!it){ toast('Katalog-Eintrag nicht gefunden',true); return; } cur=catalogToForm(it); title='Katalog-Eintrag bearbeiten'; }
  else if(desc.kind==='catalog'){ title='Katalog-Eintrag hinzufügen'; }
  computeUkList(); const ukOpts=UK_LIST.map(u=>`<option value="${esc(u)}"></option>`).join('');
  const h=`<div class="pcard">
    <div class="form-grp"><div class="flabel">Bezeichnung</div><input class="loc-input" id="fName" placeholder="z. B. Radialschleuse" value="${esc(cur.name)}"></div>
    <div class="form-grp"><div class="flabel">Menge (optional)</div><input class="loc-input" id="fMenge" placeholder="z. B. 2x" value="${esc(cur.menge)}"></div>
    <div class="form-grp"><div class="flabel">Kategorie</div>${natPickHTML(cur.nat,isCatalog)}</div>
    <div class="form-grp"><div class="flabel">Größe (optional)</div><div class="form-row"><select class="form-sel" id="fSizeTyp">${sizeTypOptionsHTML(cur.sizeTyp)}</select><input class="loc-input" id="fSizeVal" placeholder="z. B. 6F" value="${esc(cur.sizeVal)}"></div></div>
    <div class="form-grp"><div class="flabel">Unterkategorie (optional)</div><input class="loc-input" id="fUk" list="fUkList" placeholder="z. B. Material auf Ansage" value="${esc(cur.uk)}"><datalist id="fUkList">${ukOpts}</datalist></div>
    <div class="p-actions"><button class="btn btn-sec" onclick="closeForm()">Abbrechen</button><button class="btn btn-pri" onclick="saveEntryForm()">Speichern</button></div>
  </div>`;
  const crumb=isCatalog?'Katalog':(curStd?curStd.titel:'');
  formCtx={desc, back: desc.back||(()=>reRenderDetail())};
  $('scr-form').innerHTML=h; show('scr-form'); setBar(title, crumb, true); }
/* Öffnet das Formular für einen Katalog-Eintrag (neu oder bearbeiten). */
function openCatalogForm(id){ const back=()=>{ renderCatalog(); show('scr-catalog'); updateBar(); }; openEntryForm(id?{kind:'editCatalog',id,back}:{kind:'catalog',back}); }

function readEntryForm(){ return { name:$('fName').value, menge:$('fMenge').value, nat:($('fNatWrap').dataset.nat||'material'), sizeTyp:$('fSizeTyp').value, sizeVal:$('fSizeVal').value, uk:$('fUk').value }; }
function saveEntryForm(){ const f=readEntryForm(); if(!f.name.trim()){ toast('Bitte eine Bezeichnung eingeben',true); return; }
  const d=formCtx&&formCtx.desc; if(!d) return;
  if(d.kind==='add'){ const key=d.sid+'|'+d.ri; const arr=ADDITIONS.entries[key]||(ADDITIONS.entries[key]=[]); arr.push(makeAddEntry(Object.assign({},f,{aid:newAid()}))); saveAdditions(); rebuildDB(); buildMaterialIndex(); toast('Eintrag hinzugefügt'); }
  else if(d.kind==='editAdd'){ const e=findAddEntry(d.sid,d.ri,d.aid); if(e){ Object.assign(e,makeAddEntry(Object.assign({},f,{aid:d.aid}))); saveAdditions(); rebuildDB(); buildMaterialIndex(); toast('Gespeichert'); } }
  else if(d.kind==='editBase'){ applyBaseEntryEdit(d.cid,f); toast('Gespeichert'); }
  else if(d.kind==='catalog'){ CATALOG.items=upsertCatalogItem(CATALOG.items,makeCatalogItem(Object.assign({},f,{id:newAid()}))); saveCatalog(); toast('Zum Katalog hinzugefügt'); }
  else if(d.kind==='editCatalog'){ CATALOG.items=upsertCatalogItem(CATALOG.items,makeCatalogItem(Object.assign({},f,{id:d.id}))); saveCatalog(); toast('Gespeichert'); }
  closeForm(); }

/* Schreibt Formularwerte als Overlay auf einen Basis-Eintrag (nur an dieser Stelle). */
function applyBaseEntryEdit(cid,f){ const e=findEntry(cid); if(!e) return;
  qeSet('cid',e,cid,'name',f.name.trim());
  const menge=f.menge.trim(); qeSet('cid',e,cid,'mengeVal',menge||null);
  const val=f.sizeVal.trim(); qeSet('cid',e,cid,'groessen', val?[{typ:f.sizeTyp||'dimension',wert:val,roh:val}]:[]);
  if(f.nat===e.natur){ if(overrides[cid]){ delete overrides[cid]; saveJSON('hkl_overrides',overrides); } } else { overrides[cid]=f.nat; saveJSON('hkl_overrides',overrides); }
  const uk=f.uk.trim(); reassign[cid]=(uk||null); saveJSON('hkl_reassign',reassign);
  saveQE(); buildMaterialIndex(); computeUkList(); }

function deleteAddEntry(sid,ri,aid){ const key=sid+'|'+ri; const arr=ADDITIONS.entries[key]; if(!arr) return; ADDITIONS.entries[key]=arr.filter(x=>x._aid!==aid); if(!ADDITIONS.entries[key].length) delete ADDITIONS.entries[key]; saveAdditions(); rebuildDB(); buildMaterialIndex(); }

/* ---- Eigene Standards ---- */

  const h=`<div class="pcard">
    <div class="form-grp"><div class="flabel">Titel</div><input class="loc-input" id="sTitel" placeholder="z. B. Koronarangiografie" value="${esc(s?s.titel:'')}"></div>
    <div class="form-grp"><div class="flabel">Gruppe</div><input class="loc-input" id="sGruppe" placeholder="z. B. HKL" value="${esc(s?s.gruppe:'Eigene')}"></div>
    <p class="hint">Ein neuer Standard erhält die Rubriken „Saal und Geräte", „Material" und „Ablauf". Einträge fügst du danach in der jeweiligen Rubrik über „＋ Eintrag hinzufügen" hinzu.</p>
    <div class="p-actions"><button class="btn btn-sec" onclick="closeForm()">Abbrechen</button><button class="btn btn-pri" onclick="saveStandardForm(${s?`'${esc(s.id)}'`:'null'})">Speichern</button></div>

function saveStandardForm(id){ const titel=$('sTitel').value.trim(); const gruppe=$('sGruppe').value.trim(); if(!titel){ toast('Bitte einen Titel eingeben',true); return; }
  if(id){ updateStandard(id,titel,gruppe); toast('Gespeichert'); } else { addStandard(titel,gruppe); toast('Standard angelegt'); } closeForm(); }
function addStandard(titel,gruppe){ const taken={}; (DB?DB.standards:[]).forEach(s=>taken[s.id]=1); ADDITIONS.standards.forEach(s=>taken[s.id]=1); const id=addSlug(titel,taken);
  ADDITIONS.standards.push({ id, titel:titel.trim(), gruppe:(gruppe||'').trim()||'Eigene', dateiname:'(manuell angelegt)', _added:true, rubriken:[
